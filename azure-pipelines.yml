trigger:
  branches:
    include:
      - dev
      - qa
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'
  azureSubscription: 'svc-conn-azure'
  apiProjectPath: 'src/PollaMundialista.Api/PollaMundialista.Api.csproj'

  ${{ if eq(variables['Build.SourceBranchName'], 'dev') }}:
    appServiceName: 'polla-mundialista-api-dev'
    envName: 'dev'
  ${{ if eq(variables['Build.SourceBranchName'], 'qa') }}:
    appServiceName: 'polla-mundialista-api-qa'
    envName: 'qa'
  ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
    appServiceName: 'polla-mundialista-api'
    envName: 'prod'

stages:
# ---------- BUILD ----------
- stage: Build
  displayName: Build & Test
  jobs:
    - job: build
      steps:
        - task: UseDotNet@2
          inputs:
            packageType: 'sdk'
            version: '$(dotnetVersion)'

        - script: dotnet restore
          displayName: Restore

        - script: dotnet build --configuration $(buildConfiguration) --no-restore
          displayName: Build

        - script: dotnet test --configuration $(buildConfiguration) --no-build --logger trx
          displayName: Test

        - task: PublishTestResults@2
          condition: succeededOrFailed()
          inputs:
            testResultsFormat: 'VSTest'
            testResultsFiles: '**/*.trx'

        - script: >
            dotnet publish $(apiProjectPath)
            --configuration $(buildConfiguration)
            --output $(Build.ArtifactStagingDirectory)/api
          displayName: Publish

        - publish: $(Build.ArtifactStagingDirectory)/api
          artifact: api-drop

# ---------- DEPLOY ----------
- stage: Deploy
  displayName: Deploy to $(envName)
  dependsOn: Build
  condition: succeeded()
  jobs:
    - deployment: deploy
      displayName: Deploy API to $(appServiceName)
      environment: '$(envName)'
      strategy:
        runOnce:
          deploy:
            steps:
              - task: AzureWebApp@1
                displayName: Deploy to Azure App Service
                inputs:
                  azureSubscription: '$(azureSubscription)'
                  appType: 'webAppLinux'
                  appName: '$(appServiceName)'
                  package: '$(Pipeline.Workspace)/api-drop'
